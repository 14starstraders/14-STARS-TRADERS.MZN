<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zainabya AI</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:600px;
background:#1a1a1a;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
text-align:center;
}

#chat{
height:400px;
overflow:auto;
background:#111;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.user{
color:#00d4ff;
margin:6px 0;
}

.ai{
color:#9cff57;
margin:6px 0;
}

.input-area{
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
outline:none;
}

button{
padding:10px 15px;
border:none;
background:#6a00ff;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Zainabya AI</h1>

<div id="chat"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask anything...">
<button onclick="askAI()">Send</button>
</div>

</div>

<script>

const API_KEY = "AIzaSyAdrVgXwcDVx4JWMG5si-s5n92-HLrLSdA";

async function askAI(){

let input = document.getElementById("userInput");
let text = input.value;

if(!text) return;

let chat = document.getElementById("chat");

chat.innerHTML += "<div class='user'>You: "+text+"</div>";

input.value="";

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:text}
]
}
]
})
}
);

let data = await response.json();

let reply = "Error";

try{
reply = data.candidates[0].content.parts[0].text;
}catch(e){
reply="AI response error";
}

chat.innerHTML += "<div class='ai'>AI: "+reply+"</div>";

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
