<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zainabya AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:240px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:20px;
}

.newchat{
background:#6d28d9;
padding:10px;
border-radius:6px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
font-size:14px;
}

/* Main Chat */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
border-bottom:1px solid #333;
font-size:20px;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.user{
color:#38bdf8;
margin:8px 0;
}

.ai{
color:#4ade80;
margin:8px 0;
}

/* Input */

.inputarea{
display:flex;
padding:15px;
border-top:1px solid #333;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
background:#7c3aed;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Zainabya AI</h2>

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="header">
AI Chat
</div>

<div class="chat" id="chat"></div>

<div class="inputarea">

<input id="prompt" placeholder="Ask anything...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

const API_KEY="PASTE_API_KEY_HERE";

let chatHistory=[];

function newChat(){
document.getElementById("chat").innerHTML="";
chatHistory=[];
}

async function send(){

let input=document.getElementById("prompt");
let text=input.value;

if(!text) return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="user">You: ${text}</div>`;

input.value="";

chatHistory.push({role:"user",parts:[{text:text}]});

try{

let res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
contents:chatHistory
})

});

let data=await res.json();

let reply=data.candidates[0].content.parts[0].text;

chat.innerHTML+=`<div class="ai">AI: ${reply}</div>`;

chatHistory.push({role:"model",parts:[{text:reply}]});

chat.scrollTop=chat.scrollHeight;

}catch(e){

chat.innerHTML+=`<div class="ai">AI Error</div>`;

}

}

</script>

</body>
</html>
